apiVersion: batch/v1
kind: Job
metadata:
  name: ray-training
  namespace: coldpress-project
spec:
  template:
    metadata:
      labels:
        app: ray-training
    spec:
      restartPolicy: Never
      tolerations:
        - operator: Exists
      containers:
        - name: training
          image: rayproject/ray-ml:2.9.0-py310-gpu
          workingDir: /workspace
          command:
            - python
            - train.py
            - --dataset=mnist
            - --train-test-split=0.8
            - --epochs=50
            - --batch-size=128
            - --hidden-size=4096
            - --lr=0.01
            - --output-dir=/results/checkpoints
            - --num-workers=1
            - --gpus-per-worker=2
            - --cpus-per-worker=4
          resources:
            requests:
              nvidia.com/gpu: "2"
              memory: "16Gi"
              cpu: "8"
            limits:
              nvidia.com/gpu: "2"
              memory: "16Gi"
          env:
            - name: NCCL_DEBUG
              value: "INFO"
          volumeMounts:
            - name: results
              mountPath: /results
            - name: dshm
              mountPath: /dev/shm
            - name: training-script
              mountPath: /workspace/train.py
              subPath: train.py
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: coldpress-project-storage
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: training-script
          configMap:
            name: ray-training-files
