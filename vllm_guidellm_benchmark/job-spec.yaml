# Vanilla Kubernetes manifests
# PROBLEM: These Jobs will race - benchmark-client starts immediately
# and fails because inference-server isn't ready yet.
# Coldpress solves this with JobSet dependencies (dependsOn + status: Ready)

---
apiVersion: batch/v1
kind: Job
metadata:
  name: inference-server
  namespace: coldpress-project
spec:
  template:
    metadata:
      labels:
        app: inference-server
    spec:
      restartPolicy: Never
      tolerations:
        - operator: Exists
      containers:
        - name: server
          image: nvcr.io/nvidia/vllm:26.03-py3
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
            - --model=ibm-granite/granite-3.3-8b-instruct
            - --port=8000
            - --max-model-len=10000
            - --gpu-memory-utilization=0.6
          env:
            - name: HOME
              value: /tmp
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: results
              mountPath: /results
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: coldpress-project-storage

---
apiVersion: batch/v1
kind: Job
metadata:
  name: benchmark-client
  namespace: coldpress-project
spec:
  template:
    metadata:
      labels:
        app: benchmark-client
    spec:
      restartPolicy: Never
      tolerations:
        - operator: Exists
      containers:
        - name: client
          image: ghcr.io/vllm-project/guidellm:nightly
          command:
            - guidellm
            - benchmark
            - run
            - --target=http://localhost:8000
            - --output-dir=/results
            - --outputs=json
            - --max-seconds=30
            - --rate-type=throughput
            - --rate=1
            - --data=prompt_tokens=256,output_tokens=128
          env:
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: results
              mountPath: /results
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: coldpress-project-storage
