project: coldpress-project
output: ddp-training-job
target: kubeflow

files:
  - train.py

discovery:
  template: user_snapshot
  tasks: all

tasks:
  - name: ddp-training
    replicas: 2

    args:
      # Positioned insertion: nnodes after nproc_per_node
      # PyTorchJob auto-injects MASTER_ADDR, MASTER_PORT, RANK via env vars
      nnodes:
        value: "${REPLICAS}"
        insert_after: nproc_per_node
